version: "3.9"
services:
  service1:
    build: ../api-services/service1
    volumes:
      - ../api-services/service1/logs:/logs
    ports:
      - "5000:5000"

  service2:
    build: ../api-services/service2
    volumes:
      - ../api-services/service2/logs:/logs
    ports:
      - "5001:5001"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.2
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.2
    volumes:
      - ./elasticsearch/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - ../api-services/service1/logs:/logs
      - ../api-services/service2/logs:/logs
    depends_on:
      - elasticsearch

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:9.9.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  esdata:
  grafana-data:
